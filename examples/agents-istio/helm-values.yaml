# Helm values override for the AI Research Assistant demo (Istio mode).
# Used by setup.sh to configure the TTS with the mock IdP.
tts:
  config:
    trustDomain: "demo.example.com"
    subjectTokens:
      - issuer:
          url: "http://mock-idp.demo.svc.cluster.local:8080"
          audiences: ["demo-app"]
        claimMappings:
          subject:
            claim: "email"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

extauth:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

controller:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

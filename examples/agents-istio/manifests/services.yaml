    matchLabels:
      app: retriever
  template:
    metadata:
      labels:
        app: retriever
    spec:
      containers:
        - name: retriever
          image: kontxt-retriever:latest
          imagePullPolicy: Never
          args:
            - --addr=:8082
            - --jwks=http://kontxt-tts.kontxt-system.svc.cluster.local/.well-known/jwks.json
            - --trust-domain=demo.example.com
          ports:
            - containerPort: 8082
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: retriever
  namespace: demo
spec:
  selector:
    app: retriever
  ports:
    - port: 8082
      targetPort: http
      name: http

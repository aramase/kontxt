name: Push Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aramase/kontxt

jobs:
  push-images:
    name: Push ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: tts
            dockerfile: cmd/tts/Dockerfile
          - component: extauth
            dockerfile: cmd/extauth/Dockerfile
          - component: controller
            dockerfile: cmd/controller/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}:latest
          build-args: |
            VERSION=latest
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: kontxt-tts-config
  namespace: kontxt-system
data:
  config.yaml: |
    trustDomain: "kontxt-e2e.cluster.local"
    issuer: "https://kontxt-tts.kontxt-system.svc.cluster.local"
    subjectTokens: []
    defaults:
      tokenLifetime: "15s"
      keySize: 2048
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kontxt-tts
  namespace: kontxt-system
  labels:
    app.kubernetes.io/name: kontxt-tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kontxt-tts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kontxt-tts
    spec:
      containers:
        - name: tts
          image: kontxt-tts:e2e
          imagePullPolicy: Never
          args:
            - --config=/etc/kontxt/config.yaml
            - --addr=:8080
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
          volumeMounts:
            - name: config
              mountPath: /etc/kontxt
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kontxt-tts-config
---
apiVersion: v1
kind: Service
metadata:
  name: kontxt-tts
  namespace: kontxt-system
spec:
  selector:
    app.kubernetes.io/name: kontxt-tts
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http

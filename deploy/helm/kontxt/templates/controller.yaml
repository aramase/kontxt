apiVersion: v1
kind: ServiceAccount
metadata:
  name: kontxt-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-controller
    app.kubernetes.io/part-of: kontxt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kontxt-controller
  labels:
    app.kubernetes.io/name: kontxt-controller
    app.kubernetes.io/part-of: kontxt
rules:
  - apiGroups: ["kontxt.io"]
    resources:
      - txtokenconfigs
      - transactiontypes
      - servicetokenrequirements
      - tokenpolicies
    verbs: [get, list, watch]
  - apiGroups: ["kontxt.io"]
    resources:
      - transactiontypes/status
      - servicetokenrequirements/status
      - tokenpolicies/status
    verbs: [get, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kontxt-controller
  labels:
    app.kubernetes.io/name: kontxt-controller
    app.kubernetes.io/part-of: kontxt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kontxt-controller
subjects:
  - kind: ServiceAccount
    name: kontxt-controller
    namespace: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kontxt-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-controller
    app.kubernetes.io/part-of: kontxt
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kontxt-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kontxt-controller
        app.kubernetes.io/part-of: kontxt
    spec:
      serviceAccountName: kontxt-controller
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          args:
            - --metrics-bind-address=:8090
            - --health-probe-bind-address=:8091
            - --grpc-addr=:9090
          ports:
            - containerPort: 8090
              name: metrics
            - containerPort: 8091
              name: health
            - containerPort: 9090
              name: grpc
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: kontxt-controller
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-controller
    app.kubernetes.io/part-of: kontxt
spec:
  selector:
    app.kubernetes.io/name: kontxt-controller
  ports:
    - port: 9090
      targetPort: grpc
      protocol: TCP
      name: grpc

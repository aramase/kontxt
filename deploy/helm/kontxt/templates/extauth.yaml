apiVersion: v1
kind: ServiceAccount
metadata:
  name: kontxt-extauth
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-extauth
    app.kubernetes.io/part-of: kontxt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kontxt-extauth
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-extauth
    app.kubernetes.io/part-of: kontxt
spec:
  replicas: {{ .Values.extauth.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kontxt-extauth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kontxt-extauth
        app.kubernetes.io/part-of: kontxt
    spec:
      serviceAccountName: kontxt-extauth
      containers:
        - name: extauth
          image: "{{ .Values.extauth.image.repository }}:{{ .Values.extauth.image.tag }}"
          imagePullPolicy: {{ .Values.extauth.image.pullPolicy }}
          args:
            - --addr=:{{ .Values.extauth.port }}
            - --tts=http://kontxt-tts.{{ .Values.namespace }}.svc.cluster.local
            - --jwks=http://kontxt-tts.{{ .Values.namespace }}.svc.cluster.local/.well-known/jwks.json
            - --trust-domain={{ .Values.tts.config.trustDomain }}
            - --mode=verify
            - --rules-file=/etc/kontxt/rules/rules.json
          ports:
            - containerPort: {{ .Values.extauth.port }}
              name: grpc
              protocol: TCP
          volumeMounts:
            - name: verification-rules
              mountPath: /etc/kontxt/rules
              readOnly: true
          resources:
            {{- toYaml .Values.extauth.resources | nindent 12 }}
      volumes:
        - name: verification-rules
          configMap:
            name: kontxt-verification-rules
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: kontxt-extauth
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-extauth
    app.kubernetes.io/part-of: kontxt
spec:
  selector:
    app.kubernetes.io/name: kontxt-extauth
  ports:
    - port: 9000
      targetPort: grpc
      protocol: TCP
      name: grpc

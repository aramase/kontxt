apiVersion: v1
kind: ServiceAccount
metadata:
  name: kontxt-tts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-tts
    app.kubernetes.io/part-of: kontxt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kontxt-tts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-tts
    app.kubernetes.io/part-of: kontxt
spec:
  replicas: {{ .Values.tts.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kontxt-tts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kontxt-tts
        app.kubernetes.io/part-of: kontxt
    spec:
      serviceAccountName: kontxt-tts
      containers:
        - name: tts
          image: "{{ .Values.tts.image.repository }}:{{ .Values.tts.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.tts.image.pullPolicy }}
          args:
            - --config=/etc/kontxt/config.yaml
            - --addr=:{{ .Values.tts.port }}
          ports:
            - containerPort: {{ .Values.tts.port }}
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.tts.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/kontxt
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kontxt-tts-config
---
apiVersion: v1
kind: Service
metadata:
  name: kontxt-tts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-tts
    app.kubernetes.io/part-of: kontxt
spec:
  selector:
    app.kubernetes.io/name: kontxt-tts
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kontxt-tts-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kontxt-tts
    app.kubernetes.io/part-of: kontxt
data:
  config.yaml: |
    trustDomain: {{ .Values.tts.config.trustDomain | quote }}
    issuer: {{ .Values.tts.config.issuer | quote }}
    subjectTokens: {{ .Values.tts.config.subjectTokens | toYaml | nindent 4 }}
    defaults:
      tokenLifetime: {{ .Values.tts.config.tokenLifetime | quote }}
      keySize: {{ .Values.tts.config.keySize }}

# kontxt Helm chart values

# TTS configuration
tts:
  image:
    repository: ghcr.io/aramase/kontxt-tts
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  config:
    trustDomain: "cluster.local"
    issuer: "https://kontxt-tts.kontxt-system.svc.cluster.local"
    tokenLifetime: "15s"
    keySize: 2048
    subjectTokens: []

# Ext auth adapter configuration
extauth:
  image:
    repository: ghcr.io/aramase/kontxt-extauth
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 9000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Controller configuration
controller:
  image:
    repository: ghcr.io/aramase/kontxt-controller
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Namespace to deploy into
namespace: kontxt-system

# Istio integration
istio:
  enabled: false

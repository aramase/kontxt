version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      module: buf.build/aramase/kontxt
      value: github.com/aramase/kontxt/gen/kontxt/rules/v1;rulesv1
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative

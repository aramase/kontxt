---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: transactiontypes.kontxt.io
spec:
  group: kontxt.io
  names:
    kind: TransactionType
    listKind: TransactionTypeList
    plural: transactiontypes
    shortNames:
    - tt
    singular: transactiontype
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TransactionType defines what TxToken to generate for a specific API endpoint.
          Owned by the transaction owner (agent developer) in their namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TransactionTypeSpec defines the generation rules for a transaction.
            properties:
              endpoint:
                description: Endpoint specifies which inbound API endpoint triggers
                  this transaction.
                properties:
                  method:
                    description: Method is the HTTP method (e.g., "POST", "GET").
                    type: string
                  path:
                    description: Path is the URL path pattern (e.g., "/api/v1/datasets/{datasetId}/analyze").
                    type: string
                required:
                - method
                - path
                type: object
              purpose:
                description: Purpose describes the intent of this transaction (becomes
                  a field in tctx).
                type: string
              rctxFields:
                description: RctxFields specifies which rctx fields to populate (e.g.,
                  "req_ip", "authn").
                items:
                  type: string
                type: array
              scope:
                description: |-
                  Scope is the requested scope for the TxToken (space-delimited).
                  Must be ≤ subject token scope and ≤ TokenPolicy ceiling.
                type: string
              tctxEnrichments:
                description: TctxEnrichments define values computed by the TTS (not
                  in the original request).
                items:
                  description: TctxEnrichment defines a tctx field computed by the
                    TTS.
                  properties:
                    enricher:
                      description: Enricher is the name of the enricher plugin to
                        invoke.
                      type: string
                    field:
                      description: Field is the tctx field name.
                      type: string
                  required:
                  - enricher
                  - field
                  type: object
                type: array
              tctxMapping:
                additionalProperties:
                  description: TctxFieldMapping defines how to extract a single tctx
                    field from the request.
                  properties:
                    field:
                      description: Field is the field name to extract from the source.
                      type: string
                    required:
                      description: Required indicates whether this field must be present
                        in the request.
                      type: boolean
                    source:
                      description: 'Source is where to extract the value from: "path",
                        "body", "header", "query".'
                      enum:
                      - path
                      - body
                      - header
                      - query
                      type: string
                  required:
                  - field
                  - source
                  type: object
                description: TctxMapping defines how to build the `tctx` claim from
                  the inbound request.
                type: object
              tokenLifetime:
                description: |-
                  TokenLifetime overrides the default token lifetime.
                  Subject to TokenPolicy ceiling.
                type: string
            required:
            - endpoint
            - purpose
            - scope
            type: object
          status:
            description: TransactionTypeStatus defines the observed state of TransactionType.
            properties:
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              effectiveTokenLifetime:
                description: EffectiveTokenLifetime is the token lifetime after TokenPolicy
                  ceiling is applied.
                type: string
              producedTctxFields:
                description: |-
                  ProducedTctxFields lists all tctx fields this transaction type produces
                  (extracted + enriched + purpose).
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kontxt-controller
rules:
- apiGroups:
  - kontxt.io
  resources:
  - servicetokenrequirements
  - tokenpolicies
  - transactiontypes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kontxt.io
  resources:
  - servicetokenrequirements/status
  - tokenpolicies/status
  - transactiontypes/status
  verbs:
  - get
  - patch
  - update
